<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" role="img" aria-label="Neighborly emblem">
  <title>Neighborly</title>

  <defs>
    <!-- Clip the emblem to a circular viewport so any decorative gold
         flourish stays inside the spinning container. -->
    <clipPath id="discClip">
      <circle cx="180" cy="180" r="180"/>
    </clipPath>

    <!-- Brass-like gradient that emulates the metallic gold look. -->
    <linearGradient id="goldFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FFF1B8"/>
      <stop offset="25%" stop-color="#F2C94C"/>
      <stop offset="55%" stop-color="#C99326"/>
      <stop offset="80%" stop-color="#8C5E12"/>
      <stop offset="100%" stop-color="#5A3A07"/>
    </linearGradient>

    <!-- Inner highlight gradient for the embossed "shine" effect on the
         top-left of the monogram. -->
    <linearGradient id="goldHi" x1="0.1" y1="0.1" x2="0.6" y2="0.6">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft drop shadow so the dark N reads lifted from the gold plate. -->
    <filter id="liftShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="4" result="off"/>
      <feComponentTransfer in="off" result="shadow">
        <feFuncA type="linear" slope="0.55"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Gold-plated circular plate -->
  <g clip-path="url(#discClip)">
    <rect x="0" y="0" width="360" height="360" fill="url(#goldFill)"/>

    <!-- Inner embossed ring (lighter rim) -->
    <circle cx="180" cy="180" r="172" fill="none" stroke="#FFE082" stroke-width="3" opacity="0.55"/>

    <!-- Specular highlight sweeping top-left to bottom-right -->
    <rect x="0" y="0" width="360" height="360" fill="url(#goldHi)"/>

    <!-- The big stylised "N" monogram — italic serif, drawn as a path so
         the curves get a metallic edge. -->
    <g filter="url(#liftShadow)" transform="translate(180 180)">
      <path
        d="M -70 -90
           C -78 -90 -84 -82 -82 -72
           L -68 70
           C -66 84 -58 92 -42 92
           C -28 92 -22 84 -22 72
           L -22 -34
           L 22 -34
           L 22 70
           C 22 84 28 92 44 92
           C 60 92 66 84 68 70
           L 82 -72
           C 84 -82 78 -90 70 -90
           L -70 -90 Z"
        fill="#1F1F1F"
        stroke="#FFFFFF"
        stroke-width="2"
        stroke-linejoin="round"
        transform="rotate(0)"
        opacity="0.95"
      />

      <!-- Italic slant + flourish on the top serif to add the "F-curves"
         feel from the reference design. -->
      <g transform="skewX(-10)">
        <path
          d="M -82 -90 L -68 -90 C -50 -100 -28 -100 -8 -90"
          fill="none"
          stroke="#1F1F1F"
          stroke-width="10"
          stroke-linecap="round"
        />
        <path
          d="M -22 -90 L -8 -90 C 14 -100 38 -100 60 -90 L 68 -90"
          fill="none"
          stroke="#1F1F1F"
          stroke-width="10"
          stroke-linecap="round"
        />
      </g>
    </g>
  </g>

  <!-- Outer thin frame to clip any sub-pixel outline artifacts -->
  <circle cx="180" cy="180" r="178" fill="none" stroke="#3F2706" stroke-width="2" opacity="0.35"/>
</svg>
