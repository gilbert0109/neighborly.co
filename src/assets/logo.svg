<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" role="img" aria-label="Neighborly emblem">
  <title>Neighborly emblem</title>

  <!-- Topographic green background, clipped to a circle so it pairs naturally
       with a static wordmark placed alongside it. -->
  <defs>
    <clipPath id="topoClip">
      <circle cx="180" cy="180" r="180"/>
    </clipPath>
  </defs>

  <circle cx="180" cy="180" r="180" fill="#7CA34A"/>

  <!-- Topographic terrain curves (lighter green overlay) -->
  <g fill="none" stroke="#9CC05F" stroke-width="2.2" opacity="0.7" stroke-linecap="round" clip-path="url(#topoClip)">
    <path d="M 0,40 C 110,80 220,30 330,80 S 360,80 360,90"/>
    <path d="M 0,90 C 120,140 250,90 360,150"/>
    <path d="M 0,150 C 100,210 230,150 340,220 S 360,180 360,220"/>
    <path d="M 0,220 C 90,290 220,210 320,300 S 360,240 360,300"/>
    <path d="M 0,300 C 110,380 240,300 340,400 S 360,330 360,400"/>
    <path d="M 0,400 C 90,470 220,400 320,470 S 360,420 360,470"/>
  </g>

  <!-- Dark circular emblem inner -->
  <circle cx="180" cy="180" r="110" fill="#1F1F1F"/>

  <!-- Mascot face features (white). Coordinates assume the 180-radius frame,
       so the face is well centered and rotation-safe. -->
  <ellipse cx="140" cy="115" rx="7" ry="4" fill="#F4F4F4"/>
  <ellipse cx="220" cy="115" rx="7" ry="4" fill="#F4F4F4"/>
  <line x1="140" y1="115" x2="134" y2="98" stroke="#F4F4F4" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="220" y1="115" x2="226" y2="98" stroke="#F4F4F4" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="155" cy="160" r="6" fill="#F4F4F4"/>
  <circle cx="195" cy="160" r="6" fill="#F4F4F4"/>
  <path d="M 145 200 Q 175 225 205 200" fill="none" stroke="#F4F4F4" stroke-width="5" stroke-linecap="round"/>
</svg>
